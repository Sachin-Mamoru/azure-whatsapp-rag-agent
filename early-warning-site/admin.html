<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Early Warning Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 12px; padding: 36px; width: 100%; max-width: 480px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { font-size: 1.3rem; margin-bottom: 6px; color: #1a252f; }
    p  { font-size: 0.85rem; color: #888; margin-bottom: 28px; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: #555; margin-bottom: 6px; }
    input, select { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 7px; font-size: 0.9rem; margin-bottom: 16px; }
    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 7px; font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
    .btn:hover { opacity: 0.88; }
    .btn-blue   { background: #2980b9; color: #fff; }
    .btn-red    { background: #e74c3c; color: #fff; }
    .btn-green  { background: #27ae60; color: #fff; }
    .btn-orange { background: #e67e22; color: #fff; }
    .msg { padding: 12px; border-radius: 7px; font-size: 0.88rem; display: none; margin-bottom: 10px; }
    .ok  { background: #d5f5e3; color: #1e8449; }
    .err { background: #fdecea; color: #c0392b; }
    hr { border: none; border-top: 1px solid #eee; margin: 20px 0; }
    a { color: #2980b9; font-size: 0.82rem; }
  </style>
</head>
<body>
<div class="card">
  <h1>Early Warning Admin</h1>
  <p>Select a district and toggle its early warning status.</p>
  <label>GitHub Owner</label>
  <input id="owner" placeholder="Sachin-Mamoru" />
  <label>Repository</label>
  <input id="repo" placeholder="azure-whatsapp-rag-agent" />
  <div class="row">
    <div><label>Branch</label><input id="branch" value="main" /></div>
    <div><label>Path</label><input id="path" value="early-warning-site/data.json" /></div>
  </div>
  <label>GitHub PAT Token (repo scope)</label>
  <input id="token" type="password" placeholder="ghp_..." />
  <button class="btn btn-blue"   onclick="saveConfig()">Save Config</button>
  <button class="btn btn-orange" onclick="loadData()">Load Districts</button>
  <hr />
  <label>District</label>
  <select id="district"><option value="">-- load first --</option></select>
  <div id="msg" class="msg"></div>
  <button class="btn btn-red"   onclick="setWarning(true)">Activate Early Warning</button>
  <button class="btn btn-green" onclick="setWarning(false)">Clear Warning</button>
  <hr />
  <a href="index.html">Back to Public Site</a>
</div>
<script>
  const LS = {
    s: (k, v) => localStorage.setItem(k, v),
    g: (k, d = '') => localStorage.getItem(k) ?? d
  };
  let data = null, sha = null;

  function saveConfig() {
    LS.s('o', document.getElementById('owner').value.trim());
    LS.s('r', document.getElementById('repo').value.trim());
    LS.s('b', document.getElementById('branch').value.trim() || 'main');
    LS.s('p', document.getElementById('path').value.trim());
    LS.s('t', document.getElementById('token').value.trim());
    msg('Config saved!', false);
  }

  function restoreConfig() {
    document.getElementById('owner').value  = LS.g('o');
    document.getElementById('repo').value   = LS.g('r');
    document.getElementById('branch').value = LS.g('b', 'main');
    document.getElementById('path').value   = LS.g('p', 'early-warning-site/data.json');
    document.getElementById('token').value  = LS.g('t');
  }

  function apiUrl() {
    return `https://api.github.com/repos/${LS.g('o')}/${LS.g('r')}/contents/${LS.g('p')}`;
  }

  function hdrs() {
    return {
      'Authorization': `Bearer ${LS.g('t')}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    };
  }

  async function loadData() {
    if (!LS.g('t')) { msg('Save config first.', true); return; }
    try {
      const r = await fetch(apiUrl(), { headers: hdrs() });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const m = await r.json();
      sha  = m.sha;
      data = JSON.parse(atob(m.content.replace(/\n/g, '')));
      const sel = document.getElementById('district');
      sel.innerHTML = Object.keys(data.warnings)
        .map(d => `<option>${d}</option>`).join('');
      msg('Loaded! Select a district.', false);
    } catch (e) { msg(e.message, true); }
  }

  async function setWarning(active) {
    if (!data) { msg('Load districts first.', true); return; }
    const d = document.getElementById('district').value;
    if (!d) { msg('Select a district.', true); return; }
    data.warnings[d] = active;
    data.last_updated = new Date().toISOString();
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    try {
      const r = await fetch(apiUrl(), {
        method: 'PUT', headers: hdrs(),
        body: JSON.stringify({
          message: (active ? 'activate' : 'clear') + ' warning: ' + d,
          content, sha, branch: LS.g('b', 'main')
        })
      });
      if (!r.ok) { const e = await r.json(); throw new Error(e.message); }
      sha = (await r.json()).content.sha;
      msg(d + ': ' + (active ? 'WARNING ACTIVE' : 'All Clear') + ' — updates in ~1 min', false);
    } catch (e) { msg(e.message, true); }
  }

  function msg(t, e) {
    const el = document.getElementById('msg');
    el.textContent = t;
    el.className = 'msg ' + (e ? 'err' : 'ok');
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 5000);
  }

  restoreConfig();
</script>
</body>
</html>
