<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Early Warning Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; display: flex; justify-content: center; padding: 40px 16px; min-height: 100vh; }
    .card { background: #fff; border-radius: 12px; padding: 36px; width: 100%; max-width: 520px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); height: fit-content; }
    h1 { font-size: 1.3rem; margin-bottom: 6px; color: #1a252f; }
    .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 24px; }
    .district-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
    .district-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border: 1px solid #e0e0e0; border-radius: 7px; cursor: pointer; transition: background 0.15s; }
    .district-item:hover { background: #fef9f0; }
    .district-item.active { background: #fdecea; border-color: #e74c3c; }
    .district-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: #e74c3c; cursor: pointer; flex-shrink: 0; }
    .district-item label { font-size: 0.88rem; color: #333; cursor: pointer; user-select: none; }
    .district-item.active label { color: #c0392b; font-weight: 600; }
    .actions { display: flex; gap: 10px; margin-bottom: 16px; }
    .btn { flex: 1; padding: 12px; border: none; border-radius: 7px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-green { background: #27ae60; color: #fff; }
    .btn-gray  { background: #95a5a6; color: #fff; }
    .btn-red   { background: #e74c3c; color: #fff; }
    .btn-blue  { background: #2980b9; color: #fff; }
    .alert-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
    .alert-section h2 { font-size: 0.95rem; color: #555; margin-bottom: 10px; }
    .alert-result { margin-top: 10px; font-size: 0.82rem; padding: 10px 12px; border-radius: 7px; display: none; }
    .msg { padding: 12px; border-radius: 7px; font-size: 0.88rem; display: none; margin-bottom: 12px; }
    .ok  { background: #d5f5e3; color: #1e8449; }
    .err { background: #fdecea; color: #c0392b; }
    .loading { text-align: center; color: #888; font-size: 0.9rem; padding: 20px 0; grid-column: 1/-1; }
    hr { border: none; border-top: 1px solid #eee; margin: 20px 0; }
    a { color: #2980b9; font-size: 0.82rem; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .header-row span { font-size: 0.82rem; color: #888; }
    .select-links a { color: #2980b9; cursor: pointer; font-size: 0.78rem; margin-left: 8px; }
  </style>
</head>
<body>
<div class="card">
  <h1>Early Warning Admin</h1>
  <p class="subtitle">Check districts to activate warnings, then click Save.</p>

  <div id="msg" class="msg"></div>

  <div class="header-row">
    <span id="status-label">Loading...</span>
    <div>
      <a onclick="selectAll(true)">Select all</a>
      <a onclick="selectAll(false)">Clear all</a>
    </div>
  </div>

  <div id="district-grid" class="district-grid">
    <div class="loading">Fetching current warnings...</div>
  </div>

  <div class="actions">
    <button class="btn btn-green" id="save-btn" onclick="saveChanges()" disabled>Save Changes</button>
    <button class="btn btn-gray" onclick="loadData()">Reload</button>
  </div>

  <div class="alert-section">
    <h2>🔔 Alert Controls</h2>
    <div style="display:flex; gap:10px;">
      <button class="btn btn-red" onclick="triggerAlerts()" id="alert-btn">🚨 Send Alerts Now</button>
      <button class="btn btn-blue" onclick="syncSheets()" id="sync-btn">🔄 Sync Registrations</button>
    </div>
    <div id="alert-result" class="alert-result"></div>
  </div>

  <hr />
  <a href="index.html">Back to Public Site</a>
</div>

<script>
  var sha = null;
  var currentData = null;

  var CFG = {
    owner:  "Sachin-Mamoru",
    repo:   "azure-whatsapp-rag-agent",
    branch: "main",
    path:   "early-warning-site/data.json",
    token:  "__ADMIN_PAT__"
  };

  function apiUrl() {
    return "https://api.github.com/repos/" + CFG.owner + "/" + CFG.repo + "/contents/" + CFG.path + "?ref=" + CFG.branch;
  }

  function hdrs() {
    return {
      "Authorization": "Bearer " + CFG.token,
      "Accept": "application/vnd.github.v3+json",
      "Content-Type": "application/json"
    };
  }

  async function loadData() {
    var grid = document.getElementById("district-grid");
    grid.innerHTML = '<div class="loading">Fetching current warnings...</div>';
    document.getElementById("status-label").textContent = "Loading...";
    document.getElementById("save-btn").disabled = true;
    showMsg("", false, true);

    try {
      var r = await fetch(apiUrl(), { headers: hdrs() });
      if (!r.ok) throw new Error("GitHub API error: HTTP " + r.status);
      var meta = await r.json();
      sha = meta.sha;
      currentData = JSON.parse(atob(meta.content.replace(/\n/g, "")));
      renderGrid(currentData.warnings);
      var active = Object.values(currentData.warnings).filter(Boolean).length;
      document.getElementById("status-label").textContent =
        Object.keys(currentData.warnings).length + " districts, " + active + " active";
      document.getElementById("save-btn").disabled = false;
    } catch (e) {
      grid.innerHTML = '<div class="loading" style="color:#c0392b">Failed to load: ' + e.message + "</div>";
      showMsg(e.message, true);
    }
  }

  function cbId(d) { return "cb-" + d.replace(/\s+/g, "-"); }
  function itemId(d) { return "item-" + cbId(d); }

  function renderGrid(warnings) {
    var grid = document.getElementById("district-grid");
    grid.innerHTML = Object.entries(warnings).map(function(entry) {
      var d = entry[0], active = entry[1];
      var cid = cbId(d), iid = itemId(d);
      return '<div class="district-item ' + (active ? "active" : "") + '" id="' + iid + '" onclick="toggleItem(\'' + d + '\')">' +
        '<input type="checkbox" id="' + cid + '" ' + (active ? "checked" : "") +
        ' onchange="onCheck(\'' + d + '\', this.checked)" onclick="event.stopPropagation()" />' +
        '<label for="' + cid + '">' + d + "</label></div>";
    }).join("");
  }

  function toggleItem(d) {
    var cb = document.getElementById(cbId(d));
    cb.checked = !cb.checked;
    onCheck(d, cb.checked);
  }

  function onCheck(d, checked) {
    var item = document.getElementById(itemId(d));
    if (!item) return;
    item.classList.toggle("active", checked);
    var label = item.querySelector("label");
    label.style.fontWeight = checked ? "600" : "";
    label.style.color = checked ? "#c0392b" : "#333";
  }

  function selectAll(state) {
    if (!currentData) return;
    Object.keys(currentData.warnings).forEach(function(d) {
      var cb = document.getElementById(cbId(d));
      if (cb) { cb.checked = state; onCheck(d, state); }
    });
  }

  async function saveChanges() {
    if (!currentData) return;
    var btn = document.getElementById("save-btn");
    btn.disabled = true;
    btn.textContent = "Saving...";

    var newWarnings = {};
    Object.keys(currentData.warnings).forEach(function(d) {
      var cb = document.getElementById(cbId(d));
      newWarnings[d] = cb ? cb.checked : false;
    });
    currentData.warnings = newWarnings;
    currentData.last_updated = new Date().toISOString();

    var content = btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2))));
    var activeList = Object.entries(newWarnings).filter(function(e) { return e[1]; }).map(function(e) { return e[0]; });
    var commitMsg = activeList.length
      ? "update warnings: active in " + activeList.join(", ")
      : "update warnings: all clear";

    try {
      var r = await fetch("https://api.github.com/repos/" + CFG.owner + "/" + CFG.repo + "/contents/" + CFG.path, {
        method: "PUT",
        headers: hdrs(),
        body: JSON.stringify({ message: commitMsg, content: content, sha: sha, branch: CFG.branch })
      });
      if (!r.ok) { var err = await r.json(); throw new Error(err.message); }
      var result = await r.json();
      sha = result.content.sha;
      var active = activeList.length;
      showMsg("Saved! " + active + " district" + (active !== 1 ? "s" : "") + " active. Public site updates in ~1 min.", false);
      document.getElementById("status-label").textContent =
        Object.keys(newWarnings).length + " districts, " + active + " active";
    } catch (e) {
      showMsg("Save failed: " + e.message, true);
    }

    btn.disabled = false;
    btn.textContent = "Save Changes";
  }

  function showMsg(text, isErr, hide) {
    var el = document.getElementById("msg");
    if (hide || !text) { el.style.display = "none"; return; }
    el.textContent = text;
    el.className = "msg " + (isErr ? "err" : "ok");
    el.style.display = "block";
    if (!isErr) setTimeout(function() { el.style.display = "none"; }, 6000);
  }

  var BOT = {
    url: "https://whatsapp-agent.wittysand-7a29c211.eastus.azurecontainerapps.io",
    token: "admin_secret_change_me"
  };

  async function triggerAlerts() {
    var btn = document.getElementById("alert-btn");
    var res = document.getElementById("alert-result");
    btn.disabled = true; btn.textContent = "Sending...";
    res.style.display = "none";
    try {
      var r = await fetch(BOT.url + "/admin/trigger-alerts", {
        method: "POST",
        headers: { "X-Admin-Token": BOT.token }
      });
      var data = await r.json();
      var s = data.stats || {};
      res.textContent = "✅ Done — " + (s.warnings||0) + " warning(s), " + (s.notified||0) + " notified, " + (s.skipped||0) + " skipped, " + (s.errors||0) + " errors.";
      res.style.background = "#d5f5e3"; res.style.color = "#1e8449";
    } catch(e) {
      res.textContent = "❌ Failed: " + e.message;
      res.style.background = "#fdecea"; res.style.color = "#c0392b";
    }
    res.style.display = "block";
    btn.disabled = false; btn.textContent = "🚨 Send Alerts Now";
  }

  async function syncSheets() {
    var btn = document.getElementById("sync-btn");
    var res = document.getElementById("alert-result");
    btn.disabled = true; btn.textContent = "Syncing...";
    res.style.display = "none";
    try {
      var r = await fetch(BOT.url + "/admin/sync-registrations", {
        method: "POST",
        headers: { "X-Admin-Token": BOT.token }
      });
      var data = await r.json();
      res.textContent = "✅ Sync done — " + JSON.stringify(data);
      res.style.background = "#d5f5e3"; res.style.color = "#1e8449";
    } catch(e) {
      res.textContent = "❌ Sync failed: " + e.message;
      res.style.background = "#fdecea"; res.style.color = "#c0392b";
    }
    res.style.display = "block";
    btn.disabled = false; btn.textContent = "🔄 Sync Registrations";
  }

  loadData();
</script>
</body>
</html>
