<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sri Lanka Early Warning System</title>
  <style>
    :root {
      --green:   #27ae60;
      --yellow:  #f39c12;
      --orange:  #e67e22;
      --red:     #e74c3c;
      --dark:    #1a252f;
      --card-bg: #fdfdfd;
      --border:  #dde3e8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #eaf1f8;
      color: #2c3e50;
    }

    header {
      background: var(--dark);
      color: #fff;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header img { height: 52px; }
    header h1 { font-size: 1.35rem; line-height: 1.3; }
    header p  { font-size: 0.82rem; opacity: 0.75; margin-top: 2px; }

    .top-bar {
      background: #2c3e50;
      color: #ecf0f1;
      padding: 8px 24px;
      font-size: 0.82rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .badge-none    { background: var(--green);  color: #fff; }
    .badge-low     { background: #8bc34a;       color: #fff; }
    .badge-medium  { background: var(--yellow); color: #fff; }
    .badge-high    { background: var(--orange); color: #fff; }
    .badge-extreme { background: var(--red);    color: #fff; }
    .badge-active  { background: var(--red);    color: #fff; }
    .badge-ok      { background: var(--green);  color: #fff; }

    .summary {
      padding: 20px 24px 4px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .summary-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 22px;
      flex: 1;
      min-width: 160px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .summary-card .num { font-size: 2rem; font-weight: 700; }
    .summary-card .lbl { font-size: 0.78rem; color: #666; margin-top: 2px; }
    .num-ok     { color: var(--green); }
    .num-warn   { color: var(--red); }

    .legend {
      padding: 10px 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 0.8rem;
      color: #555;
    }
    .legend span { display: flex; align-items: center; gap: 5px; }
    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
      padding: 8px 24px 32px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 10px;
      border: 1.5px solid var(--border);
      padding: 16px 18px;
      box-shadow: 0 2px 6px rgba(0,0,0,.05);
      transition: transform .15s;
    }
    .card:hover { transform: translateY(-2px); }
    .card.active-warning {
      border-color: var(--red);
      background: #fff5f5;
      animation: pulse 2.5s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(231,76,60,.25); }
      50%      { box-shadow: 0 0 0 8px rgba(231,76,60,0); }
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .card-district { font-weight: 700; font-size: 1rem; }
    .card-hazard   { font-size: 0.75rem; color: #888; margin-top: 2px; }
    .card-msg      { font-size: 0.82rem; color: #555; line-height: 1.5; }

    .status-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 3px;
    }
    .dot-none    { background: var(--green); }
    .dot-low     { background: #8bc34a; }
    .dot-medium  { background: var(--yellow); }
    .dot-high    { background: var(--orange); }
    .dot-extreme { background: var(--red); }

    footer {
      text-align: center;
      padding: 18px;
      font-size: 0.78rem;
      color: #888;
      border-top: 1px solid var(--border);
      background: #fff;
    }
    footer a { color: #3498db; text-decoration: none; }

    #loading {
      text-align: center;
      padding: 60px;
      font-size: 1.1rem;
      color: #888;
    }

    @media (max-width: 500px) {
      .grid { padding: 8px 12px 24px; }
      .summary { padding: 14px 12px 4px; }
      .legend { padding: 8px 12px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🇱🇰 Sri Lanka Early Warning System</h1>
    <p>District-level hazard alerts · Powered by WhatsApp Alert Bot</p>
  </div>
</header>

<div class="top-bar">
  <span id="updated-text">Loading data…</span>
  <a href="admin.html" style="color:#f39c12;text-decoration:none;font-weight:600;">⚙ Admin Panel</a>
</div>

<div class="summary" id="summary"></div>

<div class="legend">
  <strong>Legend:</strong>
  <span><span class="dot" style="background:var(--green)"></span> None</span>
  <span><span class="dot" style="background:#8bc34a"></span> Low</span>
  <span><span class="dot" style="background:var(--yellow)"></span> Medium</span>
  <span><span class="dot" style="background:var(--orange)"></span> High</span>
  <span><span class="dot" style="background:var(--red)"></span> Extreme</span>
</div>

<div id="loading">⏳ Fetching warning data…</div>
<div class="grid" id="grid" style="display:none;"></div>

<footer>
  Data source: <a href="data.json" target="_blank">data.json</a> &nbsp;|&nbsp;
  <a href="admin.html">Admin Toggle Panel</a> &nbsp;|&nbsp;
  Subscribe via WhatsApp to receive alerts in your language.
</footer>

<script>
  const HAZARD_ICONS = {
    flood: '🌊',
    landslide: '⛰️',
    cyclone: '🌀',
    drought: '☀️',
    storm: '⛈️',
    tsunami: '🌊',
    unknown: '⚠️',
  };

  const LEVEL_ORDER = { extreme: 0, high: 1, medium: 2, low: 3, none: 4 };

  async function loadData() {
    const resp = await fetch('data.json?_=' + Date.now());
    return resp.json();
  }

  function badgeClass(level, active) {
    if (active && level !== 'none') return 'badge-' + level;
    return active ? 'badge-active' : 'badge-none';
  }

  function dotClass(level) {
    return 'dot-' + (level || 'none');
  }

  function render(data) {
    const warnings = data.district_warnings || {};
    const entries = Object.entries(warnings);

    // Sort: active first, then by level, then alphabetically
    entries.sort(([da, a], [db, b]) => {
      if (a.active !== b.active) return a.active ? -1 : 1;
      const la = LEVEL_ORDER[a.level] ?? 4;
      const lb = LEVEL_ORDER[b.level] ?? 4;
      if (la !== lb) return la - lb;
      return da.localeCompare(db);
    });

    const activeCount = entries.filter(([, v]) => v.active).length;
    const safeCount   = entries.length - activeCount;

    // Summary cards
    document.getElementById('summary').innerHTML = `
      <div class="summary-card">
        <div class="num num-ok">${entries.length}</div>
        <div class="lbl">Total Districts</div>
      </div>
      <div class="summary-card">
        <div class="num ${activeCount > 0 ? 'num-warn' : 'num-ok'}">${activeCount}</div>
        <div class="lbl">Active Warnings</div>
      </div>
      <div class="summary-card">
        <div class="num num-ok">${safeCount}</div>
        <div class="lbl">All Clear</div>
      </div>
    `;

    // District cards
    const grid = document.getElementById('grid');
    grid.innerHTML = entries.map(([district, info]) => {
      const icon = HAZARD_ICONS[info.hazard] || '⚠️';
      const msg  = (info.message || {}).en || '';
      const lvl  = info.active ? info.level : 'none';
      return `
        <div class="card ${info.active ? 'active-warning' : ''}">
          <div class="card-header">
            <div>
              <div class="card-district">${district}</div>
              <div class="card-hazard">${icon} ${info.hazard}</div>
            </div>
            <span class="status-dot ${dotClass(lvl)}"></span>
          </div>
          <span class="badge badge-${badgeClass(info.level, info.active)}">${info.active ? info.level.toUpperCase() : 'ALL CLEAR'}</span>
          <p class="card-msg" style="margin-top:8px">${msg}</p>
        </div>
      `;
    }).join('');

    // Timestamp
    const ts = new Date(data.last_updated).toLocaleString('en-LK', {
      timeZone: 'Asia/Colombo',
      year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit',
    });
    document.getElementById('updated-text').textContent =
      `Last updated: ${ts} (Sri Lanka time) · Auto-refreshes every 5 min`;
  }

  async function init() {
    try {
      const data = await loadData();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('grid').style.display    = 'grid';
      render(data);
    } catch (e) {
      document.getElementById('loading').textContent =
        '❌ Failed to load warning data. Please refresh.';
    }
  }

  init();
  // Auto-refresh every 5 minutes
  setInterval(init, 5 * 60 * 1000);
</script>
</body>
</html>
