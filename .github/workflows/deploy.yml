name: Deploy to Azure Container Apps
on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR build
        run: |
          az acr build -r ${{ secrets.ACR_NAME }} -g ${{ secrets.AZ_RG }} -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.APP_NAME }}:latest .

      - name: Update Container App
        run: |
          az containerapp update -g ${{ secrets.AZ_RG }} -n ${{ secrets.APP_NAME }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.APP_NAME }}:latest
