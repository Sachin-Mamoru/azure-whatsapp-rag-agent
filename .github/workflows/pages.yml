name: Deploy Early Warning Site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "early-warning-site/**"

  # Allow manual triggering from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject ADMIN_PAT into admin.html
        env:
          ADMIN_PAT: ${{ secrets.ADMIN_PAT }}
        run: |
          sed -i "s|__ADMIN_PAT__|${ADMIN_PAT}|g" early-warning-site/admin.html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload early-warning-site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Only publish the early-warning-site/ subfolder
          path: ./early-warning-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
